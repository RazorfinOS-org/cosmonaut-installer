<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root may own the well-known name. -->
  <policy user="root">
    <allow own="dev.cosmonaut.Installer1"/>
    <allow send_destination="dev.cosmonaut.Installer1"/>
  </policy>

  <!-- Anyone may call methods on the service; polkit gates the
       privileged ones via the action ids in the .policy file. -->
  <policy context="default">
    <allow send_destination="dev.cosmonaut.Installer1"/>
  </policy>
</busconfig>
